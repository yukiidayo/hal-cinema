services:
  mysql:
    image: mysql:8.4
    container_name: hal-cinema-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-hal_cinema}"
      MYSQL_USER: "${MYSQL_USER:-hal_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-hal_pass}"
      TZ: "${TZ:-Asia/Tokyo}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: